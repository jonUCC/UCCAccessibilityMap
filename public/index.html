<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>UCC AccessPath Platform</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./src/css/style.css" />
  </head>
  <body>
    <div class="control-panel">
      <h3>UCC AccessPath</h3>
      <div class="instructions">
        Select Start and End points. Use <strong>Report Barrier</strong> to flag structural obstacles.
      </div>

      <div id="startPoint" class="point-display active">
        <span class="point-label">Start:</span>
        <span class="point-coords" id="startCoords">Click map to set</span>
      </div>

      <div id="endPoint" class="point-display">
        <span class="point-label">End:</span>
        <span class="point-coords" id="endCoords">Click map to set</span>
      </div>

      <div class="button-group">
        <button id="reportBtn" class="btn-warning" type="button">🚩 Report Barrier</button>
      </div>

      <div class="button-group">
        <button id="routeBtn" class="btn-primary" disabled type="button">Get Route</button>
        <button id="clearBtn" class="btn-secondary" type="button">Clear</button>
      </div>
      
      <button id="adminToggleBtn" class="btn-dark" type="button" style="margin-top: 15px; width: 100%;">View Admin Data</button>

      <div id="statusMessage" class="status-message"></div>

      <div id="routeInfo" class="route-info">
        <div class="route-stat">
          <span class="route-stat-label">Distance:</span>
          <span class="route-stat-value" id="routeDistance">-</span>
        </div>
        <div class="route-stat">
          <span class="route-stat-label">Est. time:</span>
          <span class="route-stat-value" id="routeTime">-</span>
        </div>
        <div class="route-stat" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #ccc;">
          <span class="route-stat-label">Access Confidence:</span>
          <span class="route-stat-value" id="routeConfidence" style="color: #2196f3;">-</span>
        </div>
      </div>
    </div>

    <div id="comprehensiveReportModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" id="closeReportModal">&times;</span>
        <h2>Submit Barrier Evidence</h2>
        <p>You selected coordinates: <span id="reportCoordinateDisplay" style="font-family: monospace; color: #555;"></span></p>
        
        <form id="evidenceForm">
          <label class="form-label">Classification</label>
          <select id="barrierTypeSelect" required>
            <option value="">Select obstacle nature...</option>
            <option value="Broken Lift">Broken Lift or Elevator</option>
            <option value="Steep Gradient">Unmanageable Gradient</option>
            <option value="Missing Ramp">Stairs without Ramp Access</option>
            <option value="Construction">Construction Blockage</option>
            <option value="Uneven Surface">Severe Cobblestones / Uneven Paving</option>
          </select>

          <label class="form-label">Severity Level</label>
          <select id="severitySelect" required>
            <option value="High">High - Completely impassable</option>
            <option value="Medium" selected>Medium - Major detour required</option>
            <option value="Low">Low - Difficult but manageable</option>
          </select>

          <label class="form-label">Photographic Evidence</label>
          <input type="file" id="barrierPhoto" accept="image/*" capture="environment" />

          <label class="form-label">Contextual Details</label>
          <textarea id="barrierDescription" placeholder="Provide specific details about the obstruction..." required rows="3"></textarea>
          
          <button type="submit" class="btn-primary" id="submitEvidenceBtn">Upload Record</button>
        </form>
      </div>
    </div>

    <div id="adminSidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Backend Database</h2>
            <span class="close-sidebar" id="closeSidebar">&times;</span>
        </div>
        <div class="sidebar-content" id="adminDataContainer">
            <p>Initiating database query...</p>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="./src/js/accessibility-data.js"></script>
    <script src="./src/js/accessibility-scorer.js"></script>
    <script type="module" src="./src/js/map.js"></script>
  </body>
</html>
